# /etc/calamares/modules/partitions.conf
---
efi:
    mountPoint:         "/boot/efi"
    recommendedSize:    2000MiB
    minimumSize:        512MiB
    label:              "EFI"

defaultFileSystemType: "btrfs"

btrfsSubvolumes:
    - mountpoint: /
      name: /@
    - mountpoint: /home
      name: /@home