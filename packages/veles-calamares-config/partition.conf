# /etc/calamares/modules/partition.conf
---
efi:
    mountPoint:         "/boot/efi"
    recommendedSize:    2000MiB
    minimumSize:        512MiB
    label:              "EFI"

defaultFileSystemType: "btrfs"

btrfsSubvolumes:
    - mountpoint: /
      name: /@
    - mountpoint: /home
      name: /@home

# To jest klucz do problemu z loop devices:
allowManualPartitioning: true
initialPartitioningChoice: none

# Wykluczenie loop devices (Calamares 3.3+)
showNotEncryptedBootMessage: false